version: '2.4'
services:
  intelligence-hub:
    image: highbyte/intelligence-hub:4.4.2
    expose:
      - 45245
    volumes:
      - 'appdata:/usr/local/highbyte/appData'
      - 'appconfig:/appconfig'
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Validate EULA acceptance
        # Path to appconfig JSON file containing EULA acceptance boolean
        EULA_FILE="/appconfig/accept-eula.json"

        # Verify file was created by appconfig
        if [ ! -f "$$EULA_FILE" ]; then
          echo "WARNING: EULA file not found at $$EULA_FILE"
        else
          # Strip whitespace in case JSON formatting deviates
          EULA_COMPACT=$(cat "$$EULA_FILE" | tr -d '[:space:]')

          # Verify if JSON string is true and assign required EULA environment variable
          if [ "$$EULA_COMPACT" = '{"acceptEula":true}' ]; then
            export ACCEPT_EULA=Y
          fi
        fi

        # Extract device hostname and append fixed application subpath.
        # Capture device hostname entered by the user, e.g. ie-device-001.company.com
        DEVICE_HOSTNAME_FILE="/appconfig/device-hostname.json"

        # Verify file was created by appconfig
        if [ ! -f "$$DEVICE_HOSTNAME_FILE" ]; then
          CERTSIPS_FILE="/var/run/edgedevice/certsips.json"
          echo "WARNING: Device hostname not found at $$DEVICE_HOSTNAME_FILE, defaulting to $$CERTSIPS_FILE"
          if [ ! -f "$$CERTSIPS_FILE" ]; then
            echo "WARNING: CERTSIPS file not found at $$CERTSIPS_FILE"
          else
            # Strip whitespace from file contents
            CERTSIPS_FILE_COMPACT=$(cat "$$CERTSIPS_FILE" | tr -d '[:space:]')

            # Extract key-value pair, then strip out everything besides the value including trailing '/'
            EDGE_IPS=$(echo "$$CERTSIPS_FILE_COMPACT" \
              | grep -o '"edge-ips":"[^"]*"' \
              | sed 's|"edge-ips":"||;s|"||;s|/$||')

            # Take first IP from comma-separated list
            DEVICE_HOSTNAME=$(echo "$$EDGE_IPS" | cut -d',' -f1)
          fi
        else
          # Strip whitespace from file contents
          DEVICE_HOSTNAME_COMPACT=$(cat "$$DEVICE_HOSTNAME_FILE" | tr -d '[:space:]')

          # Extract key-value pair, then strip out everything besides the value including trailing '/'
          DEVICE_HOSTNAME=$(echo "$$DEVICE_HOSTNAME_COMPACT" \
            | grep -o '"deviceHostname":"[^"]*"' \
            | sed 's|"deviceHostname":"||;s|"||;s|/$||')
        fi

        # Verify deviceHostname
        if [ -z "$$DEVICE_HOSTNAME" ]; then
          DEVICE_HOSTNAME="edge-device-001.example.com"
          echo "WARNING: deviceHostname not found in device-hostname.json, defaulting to $$DEVICE_HOSTNAME"
        fi
        
        # Construct the application endpoint and assign to the environment variable the backend uses for the redirect
        export HIGHBYTE_BASE_URL="https://$$DEVICE_HOSTNAME/intelligence-hub"

        # Generate the settings.json for the frontend to point to the backend
        echo "{\"apiBaseUrl\": \"$$HIGHBYTE_BASE_URL\"}" > /usr/local/highbyte/configuration/config/settings.json

        exec /usr/local/highbyte/runtime/entrypoint.sh "$$@"
      - --
    command: start
    restart: on-failure:3
    environment:
      JDK_JAVA_OPTIONS: >-
        -XX:MaxRAMPercentage=75
        -XX:InitialRAMPercentage=18.75
    mem_limit: 4g
    mem_reservation: 1g
    networks:
      - proxy-redirect
 
volumes:
  appdata:
  appconfig:
 
networks:
  proxy-redirect:
    external: true
