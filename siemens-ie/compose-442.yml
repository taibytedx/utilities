version: '2.4'
services:
  intelligence-hub:
    image: highbyte/intelligence-hub:4.4.2
    expose:
      - 45245
    volumes:
      - 'appdata:/usr/local/highbyte/appData'
      - 'appconfig:/appconfig'
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Validate EULA acceptance
        # Path to appconfig JSON file containing EULA acceptance boolean
        EULA_FILE="/appconfig/accept-eula.json"

        # Verify file was created by appconfig
        if [ ! -f "$$EULA_FILE" ]; then
          echo "ERROR: EULA file not found at $$EULA_FILE"
          exit 1
        fi

        # Strip whitespace in case JSON formatting deviates
        EULA_COMPACT=$(cat "$$EULA_FILE" | tr -d '[:space:]')

        # Verify the entire JSON string with boolean true
        if [ "$$EULA_COMPACT" != '{"acceptEula":true}' ]; then
          echo "ERROR: You must accept the EULA before running Intelligence Hub."
          exit 1
        fi

        # Extract device hostname and append fixed application subpath.
        # Capture device hostname entered by the user, e.g. ie-device-001.company.com
        DEVICE_URL_FILE="/appconfig/device-url.json"

        # Verify file was created by appconfig
        if [ ! -f "$$DEVICE_URL_FILE" ]; then
          echo "ERROR: device-url.json not found"
          exit 1
        fi

        # Strip whitespace from file contents
        DEVICE_URL_COMPACT=$(cat "$$DEVICE_URL_FILE" | tr -d '[:space:]')

        # Extract key-value pair, then strip out everything besides the value including trailing '/'
        DEVICE_HOSTNAME=$(echo "$$DEVICE_URL_COMPACT" \
          | grep -o '"deviceHostname":"[^"]*"' \
          | sed 's|"deviceHostname":"||;s|"||;s|/$||')

        # Verify deviceUrl
        if [ -z "$$DEVICE_HOSTNAME" ]; then
          echo "ERROR: deviceHostname not found in device-url.json"
          exit 1
        fi

        # Extract deviceScheme value (https or http), default to https if not found
        DEVICE_SCHEME=$(echo "$$DEVICE_URL_COMPACT" \
          | grep -o '"deviceScheme":"[^"]*"' \
          | sed 's|"deviceScheme":"||;s|"||')

        # Default to https if not found
        if [ -z "$$DEVICE_SCHEME" ]; then
          DEVICE_SCHEME="https"
        fi

        # Generate the application URL including subpath and copy into a JSON at the expected path
        export HIGHBYTE_BASE_URL="$$DEVICE_SCHEME://$$DEVICE_HOSTNAME/intelligence-hub"
        echo "{\"apiBaseUrl\": \"$$HIGHBYTE_BASE_URL\"}" > /usr/local/highbyte/configuration/config/settings.json

        # Assign the required environment variables
        export ACCEPT_EULA=Y
        exec /usr/local/highbyte/runtime/entrypoint.sh "$$@"
      - --
    command: start
    restart: on-failure:3
    environment:
      JDK_JAVA_OPTIONS: >-
        -XX:MaxRAMPercentage=75
        -XX:InitialRAMPercentage=18.75
    mem_limit: 4g
    mem_reservation: 1g
    networks:
      - proxy-redirect
 
volumes:
  appdata:
  appconfig:
 
networks:
  proxy-redirect:
    external: true
